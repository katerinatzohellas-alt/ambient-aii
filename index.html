<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient AI Orb</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    background: linear-gradient(135deg, #e0f2fe, #fef08a);
    transition:0.5s;
}

.dark {
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    color:white;
}

.box {
    width:360px;
    padding:20px;
    border-radius:16px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.orb {
    width:120px;
    height:120px;
    margin:0 auto 15px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ffb86b, #ff6b6b);
    animation: float 3s infinite alternate;
}

@keyframes float {
    from {transform:translateY(0);}
    to {transform:translateY(-15px);}
}

#ai {
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background: rgba(0,0,0,0.05);
    min-height:40px;
}

button {
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
button:disabled {opacity:0.6;}
</style>
</head>

<body>

<div class="box">

    <div class="orb"></div>

    <h2>Ambient AI Companion</h2>
    <p id="context"></p>

    <div id="ai">Press button or speak</div>

    <button id="talk">💬 Talk</button>
    <button id="mic">🎤 Speak</button>

</div>

<script>

const aiBox = document.getElementById("ai");
const contextBox = document.getElementById("context");

// ---------------- TIME ----------------
const hour = new Date().getHours();
let timeContext = "day";

if(hour < 12) timeContext = "morning";
else if(hour >= 20){
    timeContext = "night";
    document.body.classList.add("dark");
}

// ---------------- LOCATION ----------------
let locationText = "unknown";

navigator.geolocation.getCurrentPosition(
(pos)=>{
    locationText = `Lat ${pos.coords.latitude.toFixed(2)}, Lon ${pos.coords.longitude.toFixed(2)}`;
    contextBox.innerText = locationText;
},
()=> contextBox.innerText = "location blocked"
);

// ---------------- SPEECH ----------------
function speak(text){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    window.speechSynthesis.speak(u);
}

// ---------------- GEMINI ----------------
async function askAI(userText){

    aiBox.innerText = "Thinking...";

    const prompt = `
You are a calm digital companion.
Reply in ONE short sentence.

Time: ${timeContext}
Location: ${locationText}
User: ${userText}
`;

    const res = await fetch("/api/gemini", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

    aiBox.innerText = text || "No response";

    if(text) speak(text);
}

// ---------------- BUTTON ----------------
document.getElementById("talk").onclick = () => askAI("Hello");

// ---------------- MIC ----------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){

    const rec = new SpeechRecognition();
    rec.lang = "en-US";

    document.getElementById("mic").onclick = () => {
        aiBox.innerText = "Listening...";
        rec.start();
    };

    rec.onresult = (e) => {
        askAI(e.results[0][0].transcript);
    };

} else {
    document.getElementById("mic").disabled = true;
}

</script>

</body>
</html>
