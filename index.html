<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient AI Voice Companion</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    background: linear-gradient(135deg, #e0f2fe, #fef08a);
    transition:0.5s;
}

.dark {
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    color:white;
}

.box {
    width:360px;
    padding:20px;
    border-radius:16px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.sphere {
    width:120px;
    height:120px;
    margin:0 auto 15px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ffb86b, #ff6b6b);
    animation: float 3s infinite alternate;
}

@keyframes float {
    from {transform:translateY(0);}
    to {transform:translateY(-15px);}
}

#ai {
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background: rgba(0,0,0,0.05);
    min-height:40px;
}

button {
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:disabled { opacity:0.6; }
</style>
</head>

<body>

<div class="box">
    <div class="sphere"></div>

    <h2>Ambient AI Voice</h2>
    <p id="context"></p>

    <div id="ai">Press mic and speak</div>

    <button id="mic">🎤 Speak</button>
</div>

<script>

const aiBox = document.getElementById("ai");
const contextBox = document.getElementById("context");
const micBtn = document.getElementById("mic");

// ---------------- TIME ----------------
const hour = new Date().getHours();

let timeContext = "day";

if(hour < 12) timeContext = "morning";
else if(hour >= 20){
    timeContext = "night";
    document.body.classList.add("dark");
}

// ---------------- LOCATION ----------------
let locationText = "unknown";

navigator.geolocation.getCurrentPosition(
(pos)=>{
    locationText =
    `Lat ${pos.coords.latitude.toFixed(2)}, Lon ${pos.coords.longitude.toFixed(2)}`;
    contextBox.innerText = locationText;
},
()=>{
    contextBox.innerText = "location blocked";
});

// ---------------- SPEECH OUTPUT ----------------
function speak(text){
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    utter.rate = 1;
    window.speechSynthesis.speak(utter);
}

// ---------------- GEMINI CALL (FIXED) ----------------
async function askGemini(userText){

    aiBox.innerText = "Thinking...";

    const prompt = `
You are a calm ambient AI assistant.
Reply in ONE short friendly sentence.

User said: ${userText}
Time: ${timeContext}
Location: ${locationText}
`;

    try {

        const res = await fetch(
            "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=AIzaSyBO0taiXjGh598yYM7w3vm5ja-dA6WF3IY",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [
                        {
                            role: "user",
                            parts: [{ text: prompt }]
                        }
                    ]
                })
            }
        );

        const data = await res.json();

        console.log("API RESPONSE:", data);

        if(!res.ok){
            aiBox.innerText = data?.error?.message || "API error";
            return;
        }

        const text =
            data?.candidates?.[0]?.content?.parts?.[0]?.text;

        if(!text){
            aiBox.innerText = "No response";
            return;
        }

        aiBox.innerText = text;
        speak(text);

    } catch(err){
        console.error(err);
        aiBox.innerText = "Network error";
    }
}

// ---------------- VOICE INPUT ----------------
const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
    micBtn.disabled = true;
    micBtn.innerText = "Voice not supported";
}
else {

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    micBtn.onclick = () => {
        aiBox.innerText = "Listening...";
        recognition.start();
    };

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        askGemini(text);
    };

    recognition.onerror = (e) => {
        aiBox.innerText = "Mic error: " + e.error;
    };
}

</script>

</body>
</html>
